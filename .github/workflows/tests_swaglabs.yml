name: Build and Test Swaglabs 

on: 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pytest-playwright pytest-html
          playwright install --with-deps chromium

      - name: Run tests 
        run: pytest saucedemo/tests/test_checkout.py --html=report.html

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with: 
          name: test-report
          path: report.html
